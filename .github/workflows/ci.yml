name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF export dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            librsvg2-bin \
            fonts-noto-cjk \
            fonts-noto-core \
            texlive-latex-extra \
            texlive-xetex \
            texlive-lang-chinese

      - name: Install EPUB validation tool
        run: |
          sudo apt-get install -y default-jre-headless
          wget https://github.com/w3c/epubcheck/releases/download/v5.1.0/epubcheck-5.1.0.zip
          unzip epubcheck-5.1.0.zip
          echo "$(pwd)/epubcheck-5.1.0" >> $GITHUB_PATH

      - name: Build Honkit sites
        run: |
          python3 tools/book-kit/build_honkit.py book1-claude-code
          python3 tools/book-kit/build_honkit.py book1-claude-code --locale en
          python3 tools/book-kit/build_honkit.py book2-comparing
          python3 tools/book-kit/build_honkit.py book2-comparing --locale en

      - name: Build print HTML
        run: |
          python3 tools/book-kit/build_print_html.py book1-claude-code
          python3 tools/book-kit/build_print_html.py book1-claude-code --locale en
          python3 tools/book-kit/build_print_html.py book2-comparing
          python3 tools/book-kit/build_print_html.py book2-comparing --locale en

      - name: Export bilingual PDFs
        env:
          PDF_MAINFONT: Noto Serif CJK SC
          PDF_CJK_MAINFONT: Noto Serif CJK SC
          PDF_MONOFONT: Noto Sans Mono
        run: |
          python3 tools/book-kit/export_pdf.py book1-claude-code
          python3 tools/book-kit/export_pdf.py book1-claude-code --locale en
          python3 tools/book-kit/export_pdf.py book2-comparing
          python3 tools/book-kit/export_pdf.py book2-comparing --locale en

      - name: Export EPUBs
        run: |
          python3 tools/book-kit/export_epub.py book1-claude-code
          python3 tools/book-kit/export_epub.py book1-claude-code --locale en
          python3 tools/book-kit/export_epub.py book2-comparing
          python3 tools/book-kit/export_epub.py book2-comparing --locale en

      - name: Validate EPUBs with epubcheck
        run: |
          epubcheck book1-claude-code/exported/book1-claude-code.epub
          epubcheck book1-claude-code/exported/book1-claude-code-en.epub
          epubcheck book2-comparing/exported/book2-comparing.epub
          epubcheck book2-comparing/exported/book2-comparing-en.epub

      - name: Assemble unified Pages site
        env:
          SITE_URL: https://harness-books.agentway.dev
          CUSTOM_DOMAIN: harness-books.agentway.dev
        run: python3 tools/book-kit/build_pages_site.py

      - name: Verify bilingual outputs
        run: |
          test -f book1-claude-code/_book/index.html
          test -f book1-claude-code/_book/en/index.html
          test -f book2-comparing/_book/index.html
          test -f book2-comparing/_book/en/index.html
          test -f book1-claude-code/exported/book1-claude-code.pdf
          test -f book1-claude-code/exported/book1-claude-code-en.pdf
          test -f book2-comparing/exported/book2-comparing.pdf
          test -f book2-comparing/exported/book2-comparing-en.pdf
          test -f book1-claude-code/exported/book1-claude-code.epub
          test -f book1-claude-code/exported/book1-claude-code-en.epub
          test -f book2-comparing/exported/book2-comparing.epub
          test -f book2-comparing/exported/book2-comparing-en.epub
          test -f dist/index.html
          test -f dist/en/index.html
          test -f dist/book1-claude-code/index.html
          test -f dist/en/book1-claude-code/index.html
          test -f dist/book2-comparing/index.html
          test -f dist/en/book2-comparing/index.html
