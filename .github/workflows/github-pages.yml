name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF export dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            librsvg2-bin \
            fonts-noto-cjk \
            fonts-noto-core \
            texlive-latex-extra \
            texlive-xetex \
            texlive-lang-chinese

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build book1 website
        run: |
          python3 tools/book-kit/build_honkit.py book1-claude-code
          python3 tools/book-kit/build_honkit.py book1-claude-code --locale en
          python3 tools/book-kit/build_honkit.py book1-claude-code --locale vi

      - name: Build book2 website
        run: |
          python3 tools/book-kit/build_honkit.py book2-comparing
          python3 tools/book-kit/build_honkit.py book2-comparing --locale en
          python3 tools/book-kit/build_honkit.py book2-comparing --locale vi

      - name: Build print HTML
        run: |
          python3 tools/book-kit/build_print_html.py book1-claude-code
          python3 tools/book-kit/build_print_html.py book1-claude-code --locale en
          python3 tools/book-kit/build_print_html.py book1-claude-code --locale vi
          python3 tools/book-kit/build_print_html.py book2-comparing
          python3 tools/book-kit/build_print_html.py book2-comparing --locale en
          python3 tools/book-kit/build_print_html.py book2-comparing --locale vi

      - name: Export PDFs
        env:
          PDF_MAINFONT: Noto Serif CJK SC
          PDF_CJK_MAINFONT: Noto Serif CJK SC
          PDF_MONOFONT: Noto Sans Mono
        run: |
          python3 tools/book-kit/export_pdf.py book1-claude-code
          python3 tools/book-kit/export_pdf.py book1-claude-code --locale en
          python3 tools/book-kit/export_pdf.py book1-claude-code --locale vi
          python3 tools/book-kit/export_pdf.py book2-comparing
          python3 tools/book-kit/export_pdf.py book2-comparing --locale en
          python3 tools/book-kit/export_pdf.py book2-comparing --locale vi

      - name: Assemble unified Pages site
        env:
          SITE_URL: https://harness-books.agentway.dev
          CUSTOM_DOMAIN: harness-books.agentway.dev
        run: python3 tools/book-kit/build_pages_site.py

      - name: Verify published site payload
        run: |
          test -f dist/index.html
          test -f dist/en/index.html
          test -f dist/vi/index.html
          test -f dist/book1-claude-code/index.html
          test -f dist/en/book1-claude-code/index.html
          test -f dist/vi/book1-claude-code/index.html
          test -f dist/book2-comparing/index.html
          test -f dist/en/book2-comparing/index.html
          test -f dist/vi/book2-comparing/index.html
          test -f dist/en/book1-claude-code/exported/book1-claude-code-en.pdf
          test -f dist/en/book2-comparing/exported/book2-comparing-en.pdf
          test -f dist/vi/book1-claude-code/exported/book1-claude-code-vi.pdf
          test -f dist/vi/book2-comparing/exported/book2-comparing-vi.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
